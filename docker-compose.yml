name: api-filmes

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api_filmes}
      POSTGRES_USER: ${POSTGRES_USER:-api_filmes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_filmes}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: runtime
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-api_filmes}:${POSTGRES_PASSWORD:-api_filmes}@postgres:5432/${POSTGRES_DB:-api_filmes}?schema=public
    command: ['npm', 'run', 'prisma:migrate:deploy']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  seed:
    build:
      context: .
      target: runtime
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-api_filmes}:${POSTGRES_PASSWORD:-api_filmes}@postgres:5432/${POSTGRES_DB:-api_filmes}?schema=public
    command: ['npm', 'run', 'prisma:seed']
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: 'no'

  api:
    build:
      context: .
      target: runtime
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-api_filmes}:${POSTGRES_PASSWORD:-api_filmes}@postgres:5432/${POSTGRES_DB:-api_filmes}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      BODY_LIMIT: ${BODY_LIMIT:-100kb}
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
