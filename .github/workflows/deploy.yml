name: CI/CD - API de filmes

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configurar Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test

  deploy:
    name: Deploy em produção
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Baixar o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configurar credenciais da AWS
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Entrar no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Gerar e publicar a imagem
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$REGISTRY/$ECR_REPOSITORY:latest"

          docker build --pull --tag "$IMAGE_URI" --tag "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

      - name: Atualizar o contêiner na EC2 pelo Systems Manager
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          jq -n \
            --arg region "$AWS_REGION" \
            --arg registry "$REGISTRY" \
            --arg image "$IMAGE_URI" \
            '{
              commands: [
                "set -Eeuo pipefail",
                ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $registry),
                ("docker pull " + $image),
                "OLD_IMAGE=$(docker inspect --format={{.Config.Image}} api-filmes 2>/dev/null || true)",
                "docker rm -f api-filmes 2>/dev/null || true",
                ("docker run -d --name api-filmes --restart unless-stopped -p 80:3000 -e NODE_ENV=production " + $image),
                "for i in $(seq 1 12); do STATUS=$(docker inspect --format={{.State.Health.Status}} api-filmes 2>/dev/null || true); if [ \"$STATUS\" = \"healthy\" ]; then docker image prune -af; exit 0; fi; if [ \"$STATUS\" = \"unhealthy\" ]; then break; fi; sleep 5; done",
                "docker logs api-filmes || true",
                "docker rm -f api-filmes 2>/dev/null || true",
                "if [ -n \"$OLD_IMAGE\" ]; then docker run -d --name api-filmes --restart unless-stopped -p 80:3000 -e NODE_ENV=production \"$OLD_IMAGE\"; fi",
                "exit 1"
              ]
            }' > ssm-parameters.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy api-filmes $IMAGE_TAG" \
            --parameters file://ssm-parameters.json \
            --query 'Command.CommandId' \
            --output text)

          echo "Comando SSM enviado: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --output json > ssm-result.json

          jq -r '"Status: \(.Status)\n\nSTDOUT:\n\(.StandardOutputContent)\nSTDERR:\n\(.StandardErrorContent)"' ssm-result.json
          test "$(jq -r '.Status' ssm-result.json)" = "Success"
